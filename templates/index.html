<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧠 Memory Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <div class="header-left">
                <h1>🧠 Memory Game</h1>
            </div>
            <div class="header-right">
                <div class="stat">
                    <span>Level</span>
                    <span id="level-display">1</span>
                </div>
                <div class="stat">
                    <span>Moves</span>
                    <span id="moves-display">0</span>
                </div>
                <div class="stat">
                    <span>Pairs Found</span>
                    <span id="pairs-display">0/0</span>
                </div>
                <div class="stat">
                    <span>⭐ Stars</span>
                    <span id="stars-display">0</span>
                </div>
            </div>
        </header>

        <!-- Locked Level Message -->
        <div id="locked-message" class="locked-message" style="display:none;">
            <span>🔒</span> Complete Level <span id="locked-level">1</span> first!
        </div>

        <!-- Game Board -->
        <div id="game-board" class="game-board">
            <!-- Cards will be rendered here -->
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="reset-btn" class="btn btn-reset">🔄 New Game</button>
            <button id="prev-btn" class="btn btn-prev" title="Previous Level">◄</button>
            <button id="next-btn" class="btn btn-next" title="Next Level">►</button>
            <button id="reset-progress-btn" class="btn btn-danger">🗑️ Reset Progress</button>
        </div>

        <!-- Level Complete Modal -->
        <div id="level-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎉 Level Complete!</h2>
                </div>
                <div class="modal-body">
                    <div class="emoji-big">🌟</div>
                    <p id="modal-message">You completed Level 1!</p>
                    <div class="modal-stats">
                        <div class="modal-stat">
                            <span>Moves</span>
                            <span id="modal-moves">0</span>
                        </div>
                        <div class="modal-stat">
                            <span>Pairs Found</span>
                            <span id="modal-pairs">0</span>
                        </div>
                        <div class="modal-stat">
                            <span>Stars</span>
                            <span id="modal-stars-display">⭐</span>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="next-level-btn" class="btn btn-primary">➜ Next Level</button>
                    <button id="retry-level-btn" class="btn btn-secondary">🔄 Retry</button>
                </div>
            </div>
        </div>

        <!-- Locked Modal -->
        <div id="locked-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🔒 Level Locked!</h2>
                </div>
                <div class="modal-body">
                    <div class="emoji-big">🔐</div>
                    <p id="locked-modal-message">Complete Level 1 first to unlock Level 2!</p>
                </div>
                <div class="modal-footer">
                    <button id="locked-ok-btn" class="btn btn-primary">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
